<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taxi-Comunidad-Los-Guayos</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#FFD000;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#map{
height:65vh;
width:100%;
}

#pedirTaxi{
position:fixed;
bottom:25px;
right:25px;
background:#00c853;
color:white;
border:none;
padding:15px 20px;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.panel{
background:white;
padding:15px;
}

.taxistaCard{
background:white;
border-radius:10px;
padding:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
display:flex;
gap:10px;
}

.foto{
width:80px;
height:80px;
background:#ddd;
border-radius:8px;
}

.auto{
width:100%;
height:100px;
background:#ddd;
margin-top:6px;
border-radius:8px;
}

.perfil{
flex:1;
}

#listaTaxistas{
display:none;
padding:10px;
}

</style>

</head>

<body>

<header>
🚕 Taxi-Comunidad-Los-Guayos
</header>

<div id="map"></div>

<button id="pedirTaxi" onclick="mostrarTaxistas()">Pedir Taxi</button>

<div id="listaTaxistas"></div>

<script>

/* ================================
CONFIGURACION FIREBASE
================================ */

const firebaseConfig = {

apiKey: "AIzaSyDuDZ_uxF6P5OSc_0z7nuC0X_E98hPNsug",
authDomain: "taxi-comunidad-los-guayos.firebaseapp.com",
databaseURL: "https://taxi-comunidad-los-guayos-default-rtdb.firebaseio.com",
projectId: "taxi-comunidad-los-guayos",
storageBucket: "taxi-comunidad-los-guayos.firebasestorage.app",
messagingSenderId: "178697721594",
appId: "1:178697721594:web:69981a06c9b305c6811b43",
measurementId: "G-5HJPLK3BRJ"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ================================
MAPA
================================ */

var map = L.map('map').setView([10.188,-67.930],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Mapa'
}).addTo(map);

var markers = {};

/* ================================
ICONO TAXI
================================ */

var taxiIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3448/3448339.png",
iconSize:[35,35]
});

/* ================================
MOSTRAR TAXIS EN TIEMPO REAL
================================ */

db.ref("taxistas").on("value",function(snapshot){

var data = snapshot.val();

for(let id in markers){

map.removeLayer(markers[id]);

}

markers={};

for(let id in data){

let taxi = data[id];

let marker = L.marker([taxi.lat,taxi.lng],{icon:taxiIcon}).addTo(map);

marker.bindPopup(
"<b>"+taxi.nombre+"</b><br>"+
"Telefono: "+taxi.telefono
);

markers[id]=marker;

}

});

/* ================================
MOSTRAR LISTA DE TAXISTAS
================================ */

function mostrarTaxistas(){

var contenedor = document.getElementById("listaTaxistas");

contenedor.style.display="block";

contenedor.innerHTML="<h3>Taxistas disponibles</h3>";

db.ref("taxistas").once("value",function(snapshot){

snapshot.forEach(function(child){

let taxi = child.val();

let card = document.createElement("div");

card.className="taxistaCard";

card.innerHTML=`

<div class="foto"></div>

<div class="perfil">

<b>${taxi.nombre}</b><br>

Edad: 24 años<br>

Placa: XXXXXXX<br>

Telefono: ${taxi.telefono}<br>

<button onclick="solicitarTaxi('${taxi.telefono}')">
Solicitar Taxi
</button>

<div class="auto"></div>

</div>

`;

contenedor.appendChild(card);

});

});

}

/* ================================
SOLICITAR TAXI
================================ */

function solicitarTaxi(telefono){

let mensaje = "Hola necesito un taxi en Los Guayos";

let url = "https://wa.me/58"+telefono.substring(1)+"?text="+encodeURIComponent(mensaje);

window.open(url,"_blank");

}

/* ================================
PRECARGA DE TAXISTAS SI BASE VACIA
================================ */

db.ref("taxistas").once("value").then(function(snapshot){

if(!snapshot.exists()){

let nombres=[

"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez"

];

for(let i=0;i<nombres.length;i++){

db.ref("taxistas").push({

nombre:nombres[i],
cedula:"12345678",
telefono:"04244525765",
correo:"jhoncuenta2@gmail.com",
lat:10.188+(Math.random()/100),
lng:-67.930+(Math.random()/100),
estado:"disponible"

});

}

}

});

</script>

</body>

</html>
