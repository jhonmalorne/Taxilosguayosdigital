<html lang="es">
<head>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase (compat para usar initializeApp sencillo) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f2f2f2;
}

header{
background:#f7c600;
color:#000;

}

#map{
height:70vh;
width:100%;
}

.panel{
background:white;

}

.panel h3{
margin-top:0;
}

input,select,button{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:6px;
border-radius:4px;
border:1px solid #ccc;
}

button{
background:#f7c600;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffd900;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
🚕 Taxi-Comunidad-Los-Guayos
</header>

<div id="map"></div>

<div class="panel">
<h3>Registrar nuevo taxista</h3>

<input id="nombre" placeholder="Nombre">
<input id="cedula" placeholder="Cédula">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<select id="estado">
<option value="disponible">Disponible</option>
<option value="ocupado">Ocupado</option>
</select>

<button onclick="registrarTaxi()">Registrar Taxi</button>

<hr>

<button onclick="actualizarUbicacion()">Actualizar mi ubicación GPS</button>

</div>

<a class="whatsapp" target="_blank" href="https://wa.me/584244525765">💬</a>

<script>

/* ================================
CONFIGURACION FIREBASE
================================ */

const firebaseConfig = {
apiKey: "AIzaSyDuDZ_uxF6P5OSc_0z7nuC0X_E98hPNsug",
authDomain: "taxi-comunidad-los-guayos.firebaseapp.com",
databaseURL: "https://taxi-comunidad-los-guayos-default-rtdb.firebaseio.com",
projectId: "taxi-comunidad-los-guayos",
storageBucket: "taxi-comunidad-los-guayos.firebasestorage.app",
messagingSenderId: "178697721594",
appId: "1:178697721594:web:69981a06c9b305c6811b43",
measurementId: "G-5HJPLK3BRJ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================================
MAPA
================================ */

var map = L.map('map').setView([10.188,-67.930],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'Mapa'
}).addTo(map);

/* ================================
ICONOS TAXI
================================ */

var iconDisponible = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3448/3448339.png",
iconSize:[32,32]
});

var iconOcupado = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/3448/3448339.png",
iconSize:[32,32],
className:"taxiRojo"
});

/* ================================
MOSTRAR TAXIS
================================ */

var markers = {};

db.ref("taxistas").on("value",function(snapshot){

let data = snapshot.val();

for(let id in markers){
map.removeLayer(markers[id]);
}

markers = {};

for(let id in data){

let taxi = data[id];

let icon = taxi.estado=="ocupado" ? iconOcupado : iconDisponible;

let marker = L.marker([taxi.lat,taxi.lng],{icon:icon}).addTo(map);

marker.bindPopup(
"<b>"+taxi.nombre+"</b><br>"+
"📞 "+taxi.telefono+"<br>"+
"Estado: "+taxi.estado
);

markers[id]=marker;

}

});

/* ================================
REGISTRAR TAXI
================================ */

function registrarTaxi(){

let nombre = document.getElementById("nombre").value;
let cedula = document.getElementById("cedula").value;
let telefono = document.getElementById("telefono").value;
let correo = document.getElementById("correo").value;
let estado = document.getElementById("estado").value;

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

db.ref("taxistas").push({
nombre:nombre,
cedula:cedula,
telefono:telefono,
correo:correo,
estado:estado,
lat:lat,
lng:lng
});

alert("Taxi registrado");

});

}

/* ================================
ACTUALIZAR UBICACION
================================ */

function actualizarUbicacion(){

navigator.geolocation.getCurrentPosition(function(pos){

let lat = pos.coords.latitude;
let lng = pos.coords.longitude;

let telefono = prompt("Ingrese su teléfono para actualizar posición");

db.ref("taxistas").once("value",function(snapshot){

snapshot.forEach(function(child){

let taxi = child.val();

if(taxi.telefono==telefono){

child.ref.update({
lat:lat,
lng:lng
});

alert("Ubicación actualizada");

}

});

});

});

}

/* ================================
PRECARGA DE 20 TAXISTAS
================================ */

db.ref("taxistas").once("value").then(function(snapshot){

if(!snapshot.exists()){

let nombres=[
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez","Baldwyn Mujica",
"Jhon Alvarez","Maggie Gonzalez"
];

for(let i=0;i<nombres.length;i++){

db.ref("taxistas").push({
nombre:nombres[i],
cedula:"12345678",
telefono:"04244525765",
correo:"jhoncuenta2@gmail.com",
estado:"disponible",
lat:10.188+(Math.random()/100),
lng:-67.930+(Math.random()/100)
});

}

}

});

</script>

</body>
</html>
